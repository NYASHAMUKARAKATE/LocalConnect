# ────────────────────────────────────────────────────────
# LocalConnect CI Pipeline
# ────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///./test.db
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short

  # ── Frontend Tests & Build ─────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx tsc --noEmit || true

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  # ── Docker Build Validation ────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t localconnect-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t localconnect-frontend .
