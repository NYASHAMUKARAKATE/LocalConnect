<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>LocalConnect — Shop Local, Support Community</title>
    <meta name="description" content="LocalConnect connects you with nearby shops, fresh produce, and local businesses. Browse, order, and support your community — powered by AI." />
    <meta name="keywords" content="local shopping, Zimbabwe, community commerce, shop local, Harare, Bulawayo, marketplace" />
    <meta name="author" content="LocalConnect" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LocalConnect — Shop Local, Support Community" />
    <meta property="og:description" content="Discover nearby shops, fresh produce, and local businesses. Browse, order, and support your community." />
    <meta property="og:url" content="https://localconnect.co.zw" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="en_ZW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LocalConnect — Shop Local, Support Community" />
    <meta name="twitter:description" content="Discover nearby shops, fresh produce, and local businesses." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E40AF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Performance: preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
