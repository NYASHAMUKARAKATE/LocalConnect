# ────────────────────────────────────────────────────────
# LocalConnect — Docker Compose (local development)
# ────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: localconnect
      POSTGRES_USER: localconnect
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localconnect_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U localconnect" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://localconnect:${DB_PASSWORD:-localconnect_dev}@db:5432/localconnect
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me-in-production}
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
      PAYNOW_RETURN_URL: http://localhost/payment-return
      PAYNOW_RESULT_URL: http://backend:8000/api/payments/update
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (dev) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
